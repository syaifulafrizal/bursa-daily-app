<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bursa Daily Analyst</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .confidence-badge {
            @apply px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
    <div class="max-w-4xl mx-auto px-4 py-8">
        <header class="mb-12 text-center">
            <h1 class="text-4xl font-extrabold text-gray-900 mb-2">Bursa Daily Analyst</h1>
            <p class="text-lg text-gray-600">Automated Shariah-Compliant Market Intelligence</p>
            <div id="report-date" class="mt-4 inline-block bg-blue-100 text-blue-800 text-sm font-semibold px-4 py-1 rounded-full">
                Loading latest report...
            </div>
        </header>

        <section id="market-snapshot" class="mb-12">
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <h2 class="text-xl font-bold text-gray-800 mb-3 flex items-center">
                    <span class="mr-2">📊</span> Market Snapshot
                </h2>
                <p id="market-overview" class="text-gray-600 leading-relaxed italic">
                    Fetching today's market outlook...
                </p>
            </div>
        </section>

        <section id="top-picks" class="space-y-6">
            <h2 class="text-2xl font-bold text-gray-900 flex items-center">
                <span class="mr-2">🚀</span> Top Opportunities
            </h2>
            <div id="picks-container" class="grid grid-cols-1 gap-6">
                <!-- Picks will be injected here -->
                <div class="animate-pulse bg-white h-48 rounded-xl shadow-sm"></div>
            </div>
        </section>

        <footer class="mt-20 pt-8 border-t border-gray-200 text-center text-gray-400 text-sm pb-10">
            <p>© 2026 Bursa Daily Analyst. AI-generated evidence-based suggestions. Not financial advice.</p>
        </footer>
    </div>

    <script>
        async function loadReport() {
            try {
                // Fetch the report from the data directory
                const response = await fetch('data/daily_report.json');
                const data = await response.json();

                document.getElementById('report-date').textContent = `Analysis for: ${data.date}`;
                document.getElementById('market-overview').textContent = data.market_overview;

                const container = document.getElementById('picks-container');
                container.innerHTML = '';

                data.top_picks.forEach(pick => {
                    const confidenceColor = pick.confidence >= 8 ? 'bg-green-100 text-green-800' : (pick.confidence >= 6 ? 'bg-yellow-100 text-yellow-800' : 'bg-red-100 text-red-800');
                    
                    const card = document.createElement('div');
                    card.className = "bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100 hover:shadow-md transition-shadow duration-300";
                    card.innerHTML = `
                        <div class="p-6">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h3 class="text-2xl font-bold text-gray-900">${pick.name}</h3>
                                    <p class="text-sm font-mono text-blue-600 uppercase font-semibold">${pick.ticker}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-2xl font-black text-gray-900">RM ${pick.price.toFixed(3)}</p>
                                    <span class="inline-block px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider ${confidenceColor}">
                                        Confidence: ${pick.confidence}/10
                                    </span>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Analysis & Catalysts</h4>
                                <p class="text-gray-700 leading-relaxed">${pick.analysis}</p>
                            </div>
                            
                            <div class="pt-4 border-t border-gray-50 flex items-center">
                                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest mr-3">Stance:</span>
                                <span class="bg-indigo-600 text-white text-xs font-bold px-3 py-1 rounded uppercase tracking-wider">
                                    ${pick.strategy}
                                </span>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (error) {
                console.error('Error loading report:', error);
                document.getElementById('picks-container').innerHTML = `
                    <div class="bg-red-50 text-red-700 p-4 rounded-lg border border-red-100 text-center">
                        Failed to load latest analysis. Please check back later at 8:15 AM MYT.
                    </div>
                `;
            }
        }

        window.onload = loadReport;
    </script>
</body>
</html>
