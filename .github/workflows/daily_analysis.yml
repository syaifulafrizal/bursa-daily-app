name: Daily Bursa Analysis

on:
  schedule:
    - cron: '0 0 * * 1-5' # Runs at 00:00 UTC (8:00 AM MYT) Monday to Friday
  workflow_dispatch: # Allows manual triggering

jobs:
  analyze-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push data update
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install yfinance google-genai

      - name: Run Analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/daily_analyzer.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/daily_report.json
          git commit -m "Automated Daily Analysis: $(date +'%Y-%m-%d')" || exit 0
          git push
